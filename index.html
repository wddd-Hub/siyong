<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AA 账本</title>
    <meta name="theme-color" content="#10251f" />
    <meta name="description" content="自用 AA 记账账本，支持区间统计、结算建议和批量清账。" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">¥</span>
          <div>
            <h1>AA 账本</h1>
            <p>共享支出与结算</p>
          </div>
        </div>

        <nav class="tabs" aria-label="主要视图">
          <button class="tab-button active" data-tab="overview" type="button">
            <span aria-hidden="true">◎</span>
            总览
          </button>
          <button class="tab-button" data-tab="expenses" type="button">
            <span aria-hidden="true">＋</span>
            记一笔
          </button>
          <button class="tab-button" data-tab="members" type="button">
            <span aria-hidden="true">☷</span>
            成员
          </button>
          <button class="tab-button" data-tab="notes" type="button">
            <span aria-hidden="true">◇</span>
            备注
          </button>
        </nav>

        <section class="sidebar-panel">
          <h2>账本成员</h2>
          <form id="memberForm" class="inline-form">
            <input id="memberName" type="text" maxlength="16" placeholder="新增成员" autocomplete="off" />
            <button type="submit" title="添加成员">＋</button>
          </form>
          <div id="memberChips" class="chip-list"></div>
        </section>
      </aside>

      <main class="main-content">
        <section class="toolbar">
          <div>
            <p class="eyebrow">本地账本</p>
            <h2 id="viewTitle">款项总览</h2>
            <p id="backupStatus" class="backup-status">尚未备份</p>
          </div>
          <div class="toolbar-actions">
            <div class="date-range-control" aria-label="日期区间">
              <label>
                <span>开始</span>
                <input id="startDateFilter" type="date" />
              </label>
              <label>
                <span>结束</span>
                <input id="endDateFilter" type="date" />
              </label>
            </div>
            <div class="quick-actions">
              <button id="installBtn" class="ghost-button install-button" type="button" hidden>安装</button>
              <button id="exportBtn" class="ghost-button" type="button" title="导出数据">⇩</button>
              <button id="importBtn" class="ghost-button" type="button">上传</button>
              <input id="importFileInput" class="visually-hidden" type="file" accept="application/json,.json" />
              <button id="resetBtn" class="danger-button" type="button">清空</button>
            </div>
          </div>
        </section>
        <section id="updatePrompt" class="update-prompt" hidden>
          <span>发现新版本</span>
          <button id="reloadAppBtn" class="ghost-button" type="button">刷新更新</button>
        </section>

        <section id="overviewView" class="view active">
          <div class="metric-grid">
            <article class="metric">
              <span>总支出</span>
              <strong id="totalExpense">¥0.00</strong>
            </article>
            <article class="metric">
              <span>人均应付</span>
              <strong id="averageExpense">¥0.00</strong>
            </article>
            <article class="metric">
              <span>已记笔数</span>
              <strong id="expenseCount">0</strong>
            </article>
          </div>

          <div class="content-grid">
            <section class="panel">
              <div class="panel-heading">
                <h3>成员余额</h3>
                <span>正数应收，负数应付</span>
              </div>
              <div id="balanceList" class="balance-list"></div>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h3>结算建议</h3>
                <button id="toggleRawTransfersBtn" class="ghost-button compact-button" type="button">显示原始明细</button>
              </div>
              <div id="settlementList" class="settlement-list"></div>
            </section>
          </div>

          <section class="panel stats-panel">
            <div class="panel-heading">
              <h3>成员统计</h3>
              <span>付款、消费与净额</span>
            </div>
            <div id="statsList" class="stats-list"></div>
          </section>
        </section>

        <section id="expensesView" class="view">
          <form id="expenseForm" class="expense-form">
            <div class="field-row">
              <label>
                金额
                <input id="expenseAmount" type="number" min="0.01" step="0.01" placeholder="128.50" required />
              </label>
              <label>
                付款人
                <select id="payerSelect" required></select>
              </label>
            </div>

            <label>
              事项
              <input id="expenseTitle" type="text" maxlength="32" placeholder="晚餐、打车、门票..." required />
            </label>

            <label>
              日期
              <input id="expenseDate" type="date" required />
            </label>

            <label>
              备注
              <input id="expenseNote" type="text" maxlength="80" placeholder="可选：记录特殊说明" />
            </label>

            <fieldset>
              <legend>参与 AA 的成员</legend>
              <div id="participantList" class="checkbox-grid"></div>
            </fieldset>

            <div class="form-actions">
              <button id="saveExpenseBtn" class="primary-button" type="submit">记入账本</button>
            </div>
          </form>

          <section class="panel expense-history">
            <div class="panel-heading">
              <h3>明细</h3>
              <span id="historyHint">按时间倒序</span>
            </div>
            <div class="search-row">
              <input id="expenseSearch" type="search" placeholder="搜索事项、成员、金额..." autocomplete="off" />
              <select id="memberFilter" title="按成员筛选">
                <option value="">全部成员</option>
              </select>
              <button id="clearSearchBtn" class="ghost-button" type="button">清除</button>
            </div>
            <div class="bulk-actions">
              <label class="bulk-select">
                <input id="selectVisibleExpenses" type="checkbox" />
                全选当前结果
              </label>
              <span id="selectedCount">已选 0 笔</span>
              <button id="bulkDeleteBtn" class="danger-button" type="button" disabled>批量删除</button>
            </div>
            <div id="expenseList" class="expense-list"></div>
          </section>
        </section>

        <section id="membersView" class="view">
          <section class="panel">
              <div class="panel-heading">
                <h3>成员管理</h3>
              <span>有账单记录的成员会被保护</span>
              </div>
            <div id="memberTable" class="member-table"></div>
          </section>
        </section>

        <section id="notesView" class="view">
          <section class="panel notes-panel">
            <div class="panel-heading">
              <h3>账本备注</h3>
              <span id="notesStatus">自动保存</span>
            </div>
            <textarea id="ledgerNotes" class="notes-textarea" maxlength="5000" placeholder="可以记录长期说明、结算规则、特殊约定或待办事项..."></textarea>
          </section>
        </section>
      </main>
    </div>

    <section id="editExpenseModal" class="modal-backdrop" hidden>
      <form id="editExpenseForm" class="modal-panel">
        <div class="modal-heading">
          <div>
            <p class="eyebrow">编辑账单</p>
            <h2 id="editModalTitle">修改明细</h2>
          </div>
          <button id="closeEditModalBtn" class="icon-button" type="button" title="关闭">×</button>
        </div>

        <div class="field-row">
          <label>
            金额
            <input id="editExpenseAmount" type="number" min="0.01" step="0.01" required />
          </label>
          <label>
            付款人
            <select id="editPayerSelect" required></select>
          </label>
        </div>

        <label>
          事项
          <input id="editExpenseTitle" type="text" maxlength="32" required />
        </label>

        <label>
          日期
          <input id="editExpenseDate" type="date" required />
        </label>

        <label>
          备注
          <input id="editExpenseNote" type="text" maxlength="80" placeholder="可选：记录特殊说明" />
        </label>

        <fieldset>
          <legend>参与 AA 的成员</legend>
          <div id="editParticipantList" class="checkbox-grid"></div>
        </fieldset>

        <div class="form-actions">
          <button class="primary-button" type="submit">保存修改</button>
          <button id="cancelEditModalBtn" class="ghost-button" type="button">取消</button>
        </div>
      </form>
    </section>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong>还没有数据</strong>
        <p>先添加成员，再记一笔共同支出。</p>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
